    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            padding: 20px;
        }

        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            background: #f5f5f5;
            aspect-ratio: 1;
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .caption-display {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            z-index: 1000;
            max-width: 80%;
            text-align: center;
        }

        .load-more {
            text-align: center;
            padding: 40px 20px;
        }

        .load-more button {
            background: #000;
            color: #fff;
            border: none;
            padding: 12px 32px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .load-more button:hover {
            background: #333;
        }

        .load-more button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        /* Image placeholder while loading */
        .gallery-item img[data-src] {
            background: #f0f0f0;
            background-size: 200% 100%;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>

        const PHOTOS_PER_LOAD = 30;
        let currentIndex = 0;

        const galleryContainer = document.getElementById('gallery-container');
        const captionDisplay = document.getElementById('caption-display');
        const loadMoreBtn = document.getElementById('load-more-btn');
        const loadMoreContainer = document.getElementById('load-more-container');

        function loadPhotos() {
            const photosToLoad = allPhotos.slice(currentIndex, currentIndex + PHOTOS_PER_LOAD);
            
            photosToLoad.forEach(photo => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.dataset.caption = photo.caption;
                
                const img = document.createElement('img');
                img.src = photo.src;
                img.alt = `Photo ${photo.order}`;
                img.loading = 'lazy';
                
                item.appendChild(img);
                galleryContainer.appendChild(item);
            });

            currentIndex += PHOTOS_PER_LOAD;

            if (currentIndex >= allPhotos.length) {
                loadMoreContainer.style.display = 'none';
            }
        }

        // Load initial batch
        loadPhotos();

        // Load more button
        loadMoreBtn.addEventListener('click', loadPhotos);

        // Caption display
        galleryContainer.addEventListener('mouseover', (e) => {
            const item = e.target.closest('.gallery-item');
            if (item) {
                const caption = item.dataset.caption;
                if (caption && caption.trim() !== '') {
                    captionDisplay.textContent = caption;
                    captionDisplay.style.display = 'block';
                }
            }
        });

        galleryContainer.addEventListener('mouseout', () => {
            captionDisplay.style.display = 'none';
        });
